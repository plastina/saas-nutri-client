<p-toast></p-toast>
<p-confirmDialog icon="pi pi-exclamation-triangle"></p-confirmDialog>

<!-- Header -->
<header class="app-header">
  <div class="container app-header__container">
    <div class="app-header__brand">
      <h1 class="app-header__title">Plano Alimentar</h1>
      <p class="app-header__subtitle">
        Registro nutricional com foco em acompanhamento de paciente e prescricao
        alimentar.
      </p>

      <div class="app-header__meta">
        <span class="meta-chip">
          <i class="pi pi-save"></i>
          Prontuario salvo automaticamente
        </span>
        <span class="meta-chip" [class.is-active]="hasItemsInAnyMeal">
          <i class="pi pi-chart-line"></i>
          {{ hasItemsInAnyMeal ? "Acompanhamento em curso" : "Nova avaliacao" }}
        </span>
      </div>
    </div>

    <nav class="app-header__actions" aria-label="Acoes do plano">
      <button
        pButton
        type="button"
        [icon]="currentTheme === 'light' ? 'pi pi-moon' : 'pi pi-sun'"
        (click)="toggleTheme()"
        class="theme-toggle-btn"
        pTooltip="Alternar tema"
        tooltipPosition="bottom"
      ></button>

      <button
        pButton
        type="button"
        label="Exportar JSON"
        icon="pi pi-download"
        (click)="exportToJson()"
        [disabled]="!hasItemsInAnyMeal && !patientSessionData.name"
        class="btn btn-primary app-action-btn"
        pTooltip="Exportar plano como JSON"
        tooltipPosition="bottom"
      ></button>

      <button
        pButton
        type="button"
        label="Importar JSON"
        icon="pi pi-upload"
        (click)="fileImportInput.click()"
        class="btn btn-secondary app-action-btn"
        pTooltip="Importar plano de arquivo JSON"
        tooltipPosition="bottom"
      ></button>
    </nav>

    <input
      hidden
      type="file"
      id="import-json"
      accept=".json"
      (change)="handleFileInput($event)"
      #fileImportInput
    />
  </div>
</header>

<!-- Main Content -->
<main class="container">
  <!-- Patient Section -->
  <section class="plan-summary-wrapper">
    <app-patient-section
      [patientData]="patientSessionData"
      (patientDataChange)="onPatientDataChange()"
    ></app-patient-section>

    <!-- Meal Management -->
    <app-meal-management
      [meals]="meals"
      [selectedMealName]="selectedMealName"
      [foodSearchSuggestions]="foodSearchSuggestions"
      [selectedFoodsForAdding]="selectedFoodsForAdding"
      [selectedFoodAutoComplete]="selectedFoodAutoComplete"
      (mealAdded)="addMeal($event)"
      (foodSearch)="searchFoodsByTerm($event)"
      (foodSelected)="onFoodSelectedFromAutocomplete($event)"
      (foodRemoved)="removeFoodFromTemporaryList($event)"
      (addFoodsToMeal)="addAllSelectedFoodsToMeal()"
      (selectedMealNameChange)="selectedMealName = $event"
    ></app-meal-management>
    <app-plan-summary
      [meals]="meals"
      [availableMeasures]="availableMeasures"
      [selectedMealIndex]="selectedMealIndex"
      [selectedItemIndex]="selectedItemIndex"
      [hasItemsInAnyMeal]="hasItemsInAnyMeal"
      [totalKcal]="totalKcal"
      [totalProtein]="totalProtein"
      [totalCarbs]="totalCarbs"
      [totalFat]="totalFat"
      [totalFiber]="totalFiber"
      (exportToJson)="exportToJson()"
      (exportToPdf)="exportPlanToPdf()"
      (importFromFile)="handleFileInput($event)"
      (itemRemoved)="handleRemoveFood($event)"
      (itemChanged)="handleItemChange($event)"
      (itemSelectedForEdit)="loadMeasuresForItem($event)"
      (mealNameChanged)="handleMealNameChange($event)"
      (mealDeleted)="handleMealDelete($event)"
    ></app-plan-summary>
  </section>
</main>
